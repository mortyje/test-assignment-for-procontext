services:

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/fpm/Dockerfile
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres

  php-cli:
    build:
      context: .
      dockerfile: docker/php/cli/Dockerfile
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres

  composer:
    image: composer:2
    volumes:
      - ./:/app
    working_dir: /app

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: